<dialog
  id="edit-dialog"
  class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-gray-100 dark:bg-gray-800 p-6 rounded-lg shadow-lg w-96"
>
  <div class="pl-1 pr-1">
    <h1 class="text-3xl font-bold text-black dark:text-white">Edit Endpoint</h1>
    <form id="editEndpointForm" action="/api/endpoints" method="post">
      <div>
        <input type="hidden" id="editEndpointId" name="editEndpointId" />
        <label
          for="editEndpointName"
          class="font-medium text-sm text-gray-800 dark:text-gray-200 block"
        >
          Endpoint Name
        </label>
        <div class="pb-3">
          <input
            id="editEndpointName"
            type="text"
            name="editEndpointName"
            required
            class="w-full bg-gray-400 text-black rounded-md px-1.5 py-1"
          />
        </div>
      </div>
      <div>
        <label
          for="editEndpointUrl"
          class="font-medium text-sm text-gray-800 dark:text-gray-200 block"
        >
          Endpoint URL
        </label>
        <div class="pb-5">
          <input
            id="editEndpointUrl"
            type="url"
            name="editEndpointUrl"
            required
            class="w-full bg-gray-400 text-black rounded-md px-1.5 py-1"
          />
        </div>
      </div>

      <button
        id="editCancelButton"
        class="rounded-lg bg-white dark:bg-black text-red-700 dark:text-red-500 px-3"
        type="button"
      >
        Cancel
      </button>

      <button
        class="ml-2 rounded-lg bg-white dark:bg-black text-green-700 dark:text-green-400 px-3"
        type="submit"
      >
        Submit
      </button>

      <p
        id="editError"
        class="text-red-700 dark:text-red-500 font-bold pt-2"
      ></p>
    </form>
  </div>
</dialog>
