<dialog
  id="edit-dialog"
  class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-gray-100 dark:bg-gray-800 p-6 rounded-lg shadow-lg w-96"
>
  <div>
    <h1 class="text-3xl font-bold text-black dark:text-white mb-3">
      Edit Endpoint
    </h1>
    <form id="editEndpointForm">
      <div>
        <input type="hidden" id="editEndpointId" name="editEndpointId" />
        <label
          for="editEndpointName"
          class="font-medium text-sm text-gray-800 dark:text-gray-200 block"
        >
          Endpoint Name
        </label>
        <div class="pb-3">
          <input
            id="editEndpointName"
            type="text"
            name="editEndpointName"
            required
            class="w-full bg-white dark:bg-gray-700 text-black dark:text-white border border-gray-300 dark:border-gray-500 rounded-md px-1.5 py-1"
          />
        </div>
      </div>
      <div>
        <label
          for="editEndpointUrl"
          class="font-medium text-sm text-gray-800 dark:text-gray-200 block"
        >
          Endpoint URL
        </label>
        <div class="pb-5">
          <input
            id="editEndpointUrl"
            type="url"
            name="editEndpointUrl"
            required
            class="w-full bg-white dark:bg-gray-700 text-black dark:text-white border border-gray-300 dark:border-gray-500 rounded-md px-1.5 py-1"
          />
        </div>
      </div>

      <div class="pb-3">
        <label
          class="font-medium text-sm text-gray-800 dark:text-gray-200 block"
        >
          Active
          <input class="ml-1" id="editEndpointActive" type="checkbox" class="mt-1" />
        </label>
      </div>

      <button
        class="border border-black dark:border-white text-black dark:text-white px-2 py-1 rounded"
        type="submit"
      >
        Save
      </button>

      <button
        id="editCancelButton"
        class="border border-black dark:border-white text-black dark:text-white px-2 py-1 rounded ml-2"
        type="button"
      >
        Cancel
      </button>

      <p
        id="editError"
        class="text-red-700 dark:text-red-500 font-bold pt-2"
      ></p>
    </form>
  </div>
</dialog>
